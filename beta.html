<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bonsái Paramétrico - Motor Audiovisual Estable</title>
    <style>
        :root {
            --bg-color: #f5f5f7;
            --ui-text: #333;
            --ui-bg: #ffffff;
            --border: #d1d1d6;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100vh;
            background-color: var(--bg-color);
            font-family: 'SF Mono', 'Roboto Mono', Menlo, monospace;
            overflow: hidden;
            transition: background-color 1s ease;
        }

        #app-container {
            display: flex;
            flex-direction: row;
            width: 100%;
            height: 100vh;
            position: relative;
        }

        #canvas-container {
            flex-grow: 1; 
            position: relative;
            height: 100vh; 
            display: flex; justify-content: center; align-items: center;
        }

        svg { width: 100%; height: 100%; display: block; }

        .rama-activa { cursor: crosshair; }
        .rama-activa:hover { opacity: 0.7; }
        .brote-activo { cursor: crosshair; }
        .brote-activo:hover path { fill: #e67e22 !important; }
        .flora-activa { cursor: crosshair; }
        .flora-activa:hover path { fill: #e74c3c !important; }

        /* --- UI FLOTANTE MINIMALISTA --- */
        #floating-ui {
            position: absolute;
            bottom: 30px;
            left: 25px;
            right: 25px;
            display: flex;
            justify-content: space-between; 
            align-items: flex-end;
            z-index: 10;
            pointer-events: none; 
        }

        #floating-ui > * { pointer-events: auto; }

        .btn-zen-main {
            width: 65px; 
            height: 65px;
            border-radius: 50%;
            background: linear-gradient(135deg, #89f7fe 0%, #66a6ff 100%);
            color: white;
            font-size: 0.95rem;
            font-weight: bold;
            font-family: inherit;
            letter-spacing: 1px;
            border: none;
            box-shadow: 0 4px 15px rgba(102, 166, 255, 0.4);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s;
            position: relative;
            overflow: hidden; 
        }

        .btn-zen-main:active { transform: scale(0.92); }

        .btn-zen-main::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            transform: translate(-50%, -50%) scale(0);
            opacity: 0;
            pointer-events: none;
        }

        .btn-zen-main.active::after {
            animation: inner-ripple-zen 2.5s infinite;
        }

        @keyframes inner-ripple-zen {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            10% { opacity: 1; }
            80% { transform: translate(-50%, -50%) scale(12); opacity: 0; }
            100% { transform: translate(-50%, -50%) scale(12); opacity: 0; }
        }

        /* Botón de Engrane Puro */
        .btn-config {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid var(--border);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 1.6rem;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--ui-text);
            cursor: pointer;
            backdrop-filter: blur(5px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            transition: opacity 0.5s, transform 0.2s;
            padding-bottom: 2px; 
        }
        .btn-config:active { transform: scale(0.9); }

        /* --- DASHBOARD --- */
        #dashboard {
            width: 340px; 
            min-width: 340px; 
            height: 100vh;
            background: rgba(255, 255, 255, 0.98); 
            border-left: 1px solid var(--border);
            padding: 1.5rem; 
            display: flex; flex-direction: column; gap: 1rem;
            overflow-y: auto; box-sizing: border-box; z-index: 20;
            backdrop-filter: blur(15px);
        }

        .dashboard-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;
        }

        .btn-close {
            background: transparent; border: none; font-size: 1.5rem; color: var(--ui-text); cursor: pointer; padding: 0; line-height: 1; display: none; 
        }

        .actions, .presets { display: flex; justify-content: center; gap: 0.5rem; flex-wrap: wrap; }
        button.action-btn {
            background: transparent; border: 1px solid var(--ui-text); color: var(--ui-text); padding: 0.4rem 1rem; font-family: inherit; font-size: 0.75rem; cursor: pointer; text-transform: uppercase; transition: all 0.2s; flex-grow: 1; border-radius: 4px;
        }
        button.action-btn:hover { background: var(--ui-text); color: var(--ui-bg); }
        button.primary { background: var(--ui-text); color: var(--ui-bg); font-weight: bold; }
        button.primary:hover { background: transparent; color: var(--ui-text); }
        button.active-toggle { background: #e0e0e0; color: #000; font-weight: bold; }
        
        button.preset-btn { border-color: #999; color: #555; padding: 0.3rem 0.5rem; font-size: 0.7rem; border-radius: 4px; background: transparent; cursor: pointer; font-family: inherit; transition: 0.2s;}
        button.preset-btn:hover { background: rgba(0,0,0,0.05); border-color: #333; color: #333;}

        .parameters { display: flex; flex-direction: column; gap: 1rem; font-size: 0.75rem; margin-top: 0.5rem; }
        .control-group { display: flex; flex-direction: column; gap: 0.3rem; }
        .control-group label { display: flex; justify-content: space-between; color: var(--ui-text); font-weight: bold; }
        input[type="range"], select { width: 100%; cursor: pointer; padding: 4px; font-family: inherit; border: 1px solid var(--border); background: transparent; border-radius: 4px;}
        
        #stats { 
            position: absolute; top: 15px; left: 20px; font-size: 0.7rem; color: #aaa; 
            z-index: 5; transition: opacity 0.5s; font-weight: bold; text-transform: uppercase; letter-spacing: 1px;
        }

        body.zen-active .btn-config { opacity: 0; pointer-events: none; } 
        body.zen-active .btn-zen-main { opacity: 0.7; } 
        body.zen-active .btn-zen-main:hover { opacity: 1; }
        body.zen-idle #stats { opacity: 0; } 

        @media (max-width: 768px) {
            #app-container { flex-direction: column; }
            #canvas-container { position: absolute; width: 100%; }
            #dashboard {
                position: fixed; top: 0; right: -100%; width: 85%; max-width: 320px; box-shadow: -5px 0 25px rgba(0,0,0,0.15); transition: right 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            }
            #dashboard.open { right: 0; }
            .btn-close { display: block; } 
        }
        @media (min-width: 769px) { .btn-config { display: none; } }
    </style>
</head>
<body>

    <div id="app-container">
        <div id="canvas-container">
            <div id="stats">NODOS: 1 | AÑOS: 0.0</div>
            <svg id="bonsai-svg" viewBox="-250 -485 500 500">
                <g id="layer-pot"></g>
                <g id="layer-tree"></g>
                <g id="layer-leaves"></g>
                <g id="layer-flowers"></g>
            </svg>

            <div id="floating-ui">
                <button id="btn-zen-main" class="btn-zen-main">ZEN</button>
                <button id="btn-open-config" class="btn-config">⚙️</button>
            </div>
        </div>

        <div id="dashboard">
            <div class="dashboard-header">
                <span class="section-title" style="border: none; margin: 0; color: #333; font-size: 0.9rem;">AJUSTES DEL MOTOR</span>
                <button id="btn-close-config" class="btn-close">&times;</button>
            </div>

            <div class="actions">
                <button id="btn-reset" class="action-btn">Plantar Semilla</button>
                <button id="btn-mutar" class="action-btn primary">Mutar</button>
            </div>

            <div class="actions" style="margin-top: 0.5rem;">
                <button id="btn-hojas" class="action-btn active-toggle">Hojas</button>
                <button id="btn-flores" class="action-btn active-toggle">Flora</button>
            </div>

            <div class="actions" style="margin-top: 0.5rem;">
                <button id="btn-sfx" class="action-btn" style="border-color: #e67e22; color: #e67e22;">🍃 SFX: OFF</button>
                <button id="btn-music" class="action-btn" style="border-color: #3498db; color: #3498db;">🎵 MÚSICA: OFF</button>
            </div>

            <div class="section-title" style="margin-top: 1rem;">PRESETS</div>
            <div class="presets">
                <button class="preset-btn" onclick="aplicarPreset('pino')">Pino</button>
                <button class="preset-btn" onclick="aplicarPreset('roble')">Roble</button>
                <button class="preset-btn" onclick="aplicarPreset('arbusto')">Arbusto</button>
                <button class="preset-btn" onclick="aplicarPreset('cipres')">Ciprés</button>
                <button class="preset-btn" onclick="aplicarPreset('cerezo')" style="border-color: #e8a0bf; color: #b76e8d;">Cerezo</button>
                <button class="preset-btn" onclick="aplicarPreset('limonero')" style="border-color: #f1c40f; color: #b7950b;">Limonero</button>
            </div>

            <div class="section-title" style="margin-top: 1rem;">CONFIGURACIÓN FÍSICA</div>
            <div class="parameters">
                <div class="control-group">
                    <label><span>Forma Maceta</span></label>
                    <select id="p-maceta-forma" onchange="renderizarMaceta()">
                        <option value="estandar">Rectangular</option>
                        <option value="redonda">Tazón Suave</option>
                        <option value="alta">Alta Cascada</option>
                        <option value="plana">Plana Bosque</option>
                    </select>
                </div>
                <div class="control-group">
                    <label><span>Esmalte (Color)</span></label>
                    <select id="p-maceta-color" onchange="renderizarMaceta()">
                        <option value="#c05a41">Terracota</option>
                        <option value="#2c3e50">Azul Cobalto</option>
                        <option value="#34495e">Negro Mate</option>
                        <option value="#8c8c91">Gris Concreto</option>
                        <option value="#458b74">Verde Jade</option>
                    </select>
                </div>
                <div class="control-group">
                    <label><span>Forma Foliar</span></label>
                    <select id="p-forma">
                        <option value="huso">Huso Afilado</option>
                        <option value="ovalada">Oval Estándar</option>
                        <option value="circular">Circular Brote</option>
                        <option value="larga">Larga Sauce</option>
                        <option value="arce">Arce Lobulada</option>
                    </select>
                </div>
                <div class="control-group">
                    <label><span>Tipo de Flora</span></label>
                    <select id="p-flora">
                        <option value="aleatorio">Caos</option>
                        <option value="flor-rosa">Flores Rosas</option>
                        <option value="flor-blanca">Flores Blancas</option>
                        <option value="flor-amarilla">Flores Amarillas</option>
                        <option value="limon">Limones</option>
                        <option value="baya-roja">Baya Roja</option>
                        <option value="platano">Plátanos</option>
                        <option value="ninguno">Ninguno</option>
                    </select>
                </div>
                
                <hr style="border: 0; border-top: 1px solid #eee; margin: 0;">

                <div class="control-group">
                    <label><span style="color: #3498db;">Intensidad Viento (%)</span> <span id="val-viento" style="color: #3498db;">15</span></label>
                    <input type="range" id="p-viento" min="0" max="100" value="15">
                </div>
                <div class="control-group">
                    <label><span>Edad de Ramificación</span> <span id="val-edadRam">3.0</span></label>
                    <input type="range" id="p-edadRam" min="1.5" max="5.0" step="0.1" value="3.0">
                </div>
                <div class="control-group">
                    <label><span>Longitud Base</span> <span id="val-length">18</span></label>
                    <input type="range" id="p-length" min="5" max="30" value="18">
                </div>
                <div class="control-group">
                    <label><span>Varianza Longitud (%)</span> <span id="val-lenVar">20</span></label>
                    <input type="range" id="p-lenVar" min="0" max="100" value="20">
                </div>
                <div class="control-group">
                    <label><span>Ángulo Nacimiento (°)</span> <span id="val-angle">45</span></label>
                    <input type="range" id="p-angle" min="5" max="80" value="45">
                </div>
                <div class="control-group">
                    <label><span>Prob. Ramificación (%)</span> <span id="val-branch">65</span></label>
                    <input type="range" id="p-branch" min="0" max="100" value="65">
                </div>
                <div class="control-group">
                    <label><span>Prob. Rama Media (%)</span> <span id="val-acc">30</span></label>
                    <input type="range" id="p-acc" min="0" max="100" value="30">
                </div>
                <div class="control-group">
                    <label><span>Límite Generacional</span> <span id="val-gen">6</span></label>
                    <input type="range" id="p-gen" min="3" max="8" value="6">
                </div>
                <div class="control-group">
                    <label><span>Densidad Follaje (Max)</span> <span id="val-hojas">12</span></label>
                    <input type="range" id="p-hojas" min="0" max="30" value="12">
                </div>
                <div class="control-group">
                    <label><span>Inicio Floración (Edad)</span> <span id="val-flor">6</span></label>
                    <input type="range" id="p-flor" min="2" max="8" value="6">
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- MOTOR AUDIOVISUAL ---
        let audioCtx = null;
        let sfxEnabled = false;
        let musicEnabled = false;
        let windGainNode = null;
        let noiseSource = null;
        let chimeTimeout = null;

        const pentatonicScale = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25, 587.33];

        function initAudioCtx() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function initWind() {
            if (windGainNode || !audioCtx) return;
            try {
                const bufferSize = audioCtx.sampleRate * 2;
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) data[i] = Math.random() * 2 - 1;
                
                noiseSource = audioCtx.createBufferSource();
                noiseSource.buffer = buffer;
                noiseSource.loop = true;
                
                const filter = audioCtx.createBiquadFilter();
                filter.type = 'bandpass';
                filter.frequency.value = 800; 
                filter.Q.value = 0.5;

                windGainNode = audioCtx.createGain();
                windGainNode.gain.value = 0;

                noiseSource.connect(filter);
                filter.connect(windGainNode);
                windGainNode.connect(audioCtx.destination);
                noiseSource.start();
            } catch (e) { console.error("Error iniciando viento:", e); }
        }

        function playPop() {
            if (!sfxEnabled || !audioCtx) return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(200, audioCtx.currentTime + 0.1);
                
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 0.1);
            } catch (e) {}
        }

        function playGenerativeChime() {
            if (!musicEnabled || !audioCtx || !isZenMode) return;
            try {
                const freq = pentatonicScale[Math.floor(Math.random() * pentatonicScale.length)] * (Math.random() > 0.5 ? 1 : 0.5);
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'sine'; 
                osc.frequency.value = freq;
                
                gain.gain.setValueAtTime(0, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.15, audioCtx.currentTime + 2);
                gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 6);
                
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 6);
            } catch (e) {}
            
            chimeTimeout = setTimeout(playGenerativeChime, Math.random() * 4000 + 2000);
        }

        // --- BOTONES DE AUDIO ---
        document.getElementById('btn-sfx').addEventListener('click', (e) => {
            sfxEnabled = !sfxEnabled;
            initAudioCtx();
            if (sfxEnabled) {
                initWind();
                e.target.classList.add('active-toggle');
                e.target.innerHTML = "🍃 SFX: ON";
            } else {
                e.target.classList.remove('active-toggle');
                e.target.innerHTML = "🍃 SFX: OFF";
                if(windGainNode && audioCtx) {
                    try { windGainNode.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1); } catch(e){}
                }
            }
        });

        document.getElementById('btn-music').addEventListener('click', (e) => {
            musicEnabled = !musicEnabled;
            initAudioCtx();
            if (musicEnabled) {
                e.target.classList.add('active-toggle');
                e.target.innerHTML = "🎵 MÚSICA: ON";
                if(isZenMode) playGenerativeChime();
            } else {
                e.target.classList.remove('active-toggle');
                e.target.innerHTML = "🎵 MÚSICA: OFF";
                clearTimeout(chimeTimeout);
            }
        });


        // --- MOTOR BOTÁNICO PARAMÉTRICO ---
        const SVG_NS = "http://www.w3.org/2000/svg";
        const MAX_AGE = 8;
        const TENSION_ANIMACION = 0.08; 

        const C_YOUNG = { r: 93,  g: 125, b: 60 };
        const BARK_PALETTE = [
            { r: 70, g: 50, b: 40 }, { r: 90, g: 70, b: 50 }, { r: 110, g: 90, b: 70 }, 
            { r: 50, g: 50, b: 50 }, { r: 80, g: 80, b: 80 }, { r: 100, g: 80, b: 60 }  
        ];
        const LEAF_COLORS = ['#1f362a', '#2c4c3b', '#3e6e5a', '#5d7d3c'];

        const PRESETS_BOTANICOS = {
            pino:     { mForma: 'estandar', mColor: '#c05a41', viento: 10, length: 25, lenVar: 10, angle: 20, branch: 45, acc: 10, gen: 5, hojas: 5, flor: 8, forma: 'huso', flora: 'ninguno', edadRam: 3.5 }, 
            roble:    { mForma: 'plana',    mColor: '#2c3e50', viento: 25, length: 18, lenVar: 30, angle: 50, branch: 75, acc: 35, gen: 6, hojas: 18, flor: 7, forma: 'ovalada', flora: 'ninguno', edadRam: 2.8 },
            arbusto:  { mForma: 'redonda',  mColor: '#458b74', viento: 30, length: 8,  lenVar: 50, angle: 75, branch: 95, acc: 70, gen: 4, hojas: 25, flor: 4, forma: 'circular', flora: 'baya-roja', edadRam: 1.5 },
            cipres:   { mForma: 'alta',     mColor: '#8c8c91', viento: 15, length: 15, lenVar: 15, angle: 10, branch: 80, acc: 50, gen: 6, hojas: 8, flor: 8, forma: 'larga', flora: 'ninguno', edadRam: 3.0 },
            cerezo:   { mForma: 'redonda',  mColor: '#2c3e50', viento: 40, length: 17, lenVar: 40, angle: 45, branch: 70, acc: 25, gen: 6, hojas: 4, flor: 5, forma: 'ovalada', flora: 'flor-rosa', edadRam: 2.5 },
            limonero: { mForma: 'redonda',  mColor: '#c05a41', viento: 20, length: 16, lenVar: 25, angle: 55, branch: 75, acc: 30, gen: 5, hojas: 16, flor: 5, forma: 'ovalada', flora: 'limon', edadRam: 2.8 }
        };

        const layerPot = document.getElementById('layer-pot');
        const layerTree = document.getElementById('layer-tree');
        const layerLeaves = document.getElementById('layer-leaves');
        const layerFlowers = document.getElementById('layer-flowers');
        const statsDisplay = document.getElementById('stats');
        
        const btnOpenConfig = document.getElementById('btn-open-config');
        const btnCloseConfig = document.getElementById('btn-close-config');
        const dashboard = document.getElementById('dashboard');
        
        btnOpenConfig.addEventListener('click', () => dashboard.classList.add('open'));
        btnCloseConfig.addEventListener('click', () => dashboard.classList.remove('open'));

        let showLeaves = true;
        let showFlowers = true;
        let animationFrameId = null;
        
        let iteracionGlobal = 0;
        let tiempoViento = 0; 
        let isZenMode = false;
        let zenPausa = false;
        let idleTimeout = null;

        function getParams() {
            return {
                formaHoja: document.getElementById('p-forma').value,
                tipoFlora: document.getElementById('p-flora').value,
                edadRamificacion: parseFloat(document.getElementById('p-edadRam').value),
                baseLength: parseInt(document.getElementById('p-length').value),
                lenVariance: parseInt(document.getElementById('p-lenVar').value) / 100, 
                maxAngle: parseInt(document.getElementById('p-angle').value),
                branchProb: parseInt(document.getElementById('p-branch').value) / 100,
                accProb: parseInt(document.getElementById('p-acc').value) / 100,
                maxGen: parseInt(document.getElementById('p-gen').value),
                maxHojas: parseInt(document.getElementById('p-hojas').value),
                inicioFloracion: parseInt(document.getElementById('p-flor').value)
            };
        }

        function actualizarUI(id, valor) {
            let el = document.getElementById(id);
            if(el) el.value = valor;
            const span = document.getElementById(`val-${id.split('-')[1]}`);
            if(span) span.textContent = Number.isInteger(parseFloat(valor)) && id === 'p-edadRam' ? valor + ".0" : valor;
        }

        function aplicarPreset(tipo) {
            const p = PRESETS_BOTANICOS[tipo];
            actualizarUI('p-maceta-forma', p.mForma);
            actualizarUI('p-maceta-color', p.mColor);
            actualizarUI('p-forma', p.forma);
            actualizarUI('p-flora', p.flora);
            actualizarUI('p-viento', p.viento);
            actualizarUI('p-edadRam', p.edadRam);
            actualizarUI('p-length', p.length);
            actualizarUI('p-lenVar', p.lenVar);
            actualizarUI('p-angle', p.angle);
            actualizarUI('p-branch', p.branch);
            actualizarUI('p-acc', p.acc);
            actualizarUI('p-gen', p.gen);
            actualizarUI('p-hojas', p.hojas);
            actualizarUI('p-flor', p.flor);
            renderizarMaceta();
            inicializar();
        }

        function mutarParametros() {
            const formasM = ['estandar', 'redonda', 'alta', 'plana'];
            const coloresM = ['#c05a41', '#2c3e50', '#34495e', '#8c8c91', '#458b74'];
            const formas = ['huso', 'ovalada', 'circular', 'larga', 'arce'];
            const floras = ['aleatorio', 'flor-rosa', 'flor-blanca', 'flor-amarilla', 'limon', 'baya-roja', 'platano', 'ninguno'];
            
            actualizarUI('p-maceta-forma', formasM[Math.floor(Math.random() * formasM.length)]);
            actualizarUI('p-maceta-color', coloresM[Math.floor(Math.random() * coloresM.length)]);
            actualizarUI('p-forma', formas[Math.floor(Math.random() * formas.length)]);
            actualizarUI('p-flora', floras[Math.floor(Math.random() * floras.length)]);
            actualizarUI('p-viento', Math.floor(rnd(10, 80)));
            actualizarUI('p-edadRam', (rnd(1.5, 4.5)).toFixed(1));
            actualizarUI('p-length', Math.floor(rnd(10, 25)));
            actualizarUI('p-lenVar', Math.floor(rnd(0, 80)));
            actualizarUI('p-angle', Math.floor(rnd(15, 75)));
            actualizarUI('p-branch', Math.floor(rnd(40, 90)));
            actualizarUI('p-acc', Math.floor(rnd(10, 60)));
            actualizarUI('p-gen', Math.floor(rnd(4, 7)));
            actualizarUI('p-hojas', Math.floor(rnd(5, 25)));
            actualizarUI('p-flor', Math.floor(rnd(3, 8)));
            
            renderizarMaceta();
            inicializar();
        }

        document.querySelectorAll('input[type="range"]').forEach(input => {
            input.addEventListener('input', (e) => {
                let val = e.target.value;
                if(e.target.id === 'p-edadRam') val = parseFloat(val).toFixed(1);
                document.getElementById(`val-${e.target.id.split('-')[1]}`).textContent = val;
            });
        });

        function rnd(min, max) { return Math.random() * (max - min) + min; }

        function renderizarMaceta() {
            const forma = document.getElementById('p-maceta-forma').value;
            const color = document.getElementById('p-maceta-color').value;
            let svg = '';
            switch(forma) {
                case 'estandar':
                    svg = `<rect x="-45" y="0" width="90" height="18" fill="${color}" rx="2"/>
                           <polygon points="-40,18 40,18 30,35 -30,35" fill="${color}" opacity="0.85"/>
                           <rect x="-35" y="35" width="8" height="4" fill="${color}" opacity="0.6"/>
                           <rect x="27" y="35" width="8" height="4" fill="${color}" opacity="0.6"/>`;
                    break;
                case 'redonda':
                    svg = `<path d="M -50 5 L 50 5 C 50 40 -50 40 -50 5 Z" fill="${color}" opacity="0.9"/>
                           <rect x="-53" y="0" width="106" height="6" fill="${color}" rx="2"/>
                           <rect x="-20" y="30" width="40" height="4" fill="${color}" opacity="0.6"/>`;
                    break;
                case 'alta':
                    svg = `<polygon points="-35,6 35,6 22,70 -22,70" fill="${color}" opacity="0.85"/>
                           <rect x="-40" y="0" width="80" height="6" fill="${color}" rx="1"/>
                           <rect x="-22" y="70" width="44" height="4" fill="${color}" opacity="0.6"/>`;
                    break;
                case 'plana':
                    svg = `<rect x="-80" y="0" width="160" height="10" fill="${color}" rx="1"/>
                           <polygon points="-75,10 75,10 70,20 -70,20" fill="${color}" opacity="0.85"/>
                           <rect x="-65" y="20" width="12" height="4" fill="${color}" opacity="0.6"/>
                           <rect x="53" y="20" width="12" height="4" fill="${color}" opacity="0.6"/>`;

            }
            layerPot.innerHTML = svg;
        }

        function generarPathHoja(forma, w, l) {
            switch(forma) {
                case 'huso': return `M 0 0 Q ${w} ${l/2} 0 ${l} Q ${-w} ${l/2} 0 0 Z`;
                case 'ovalada': return `M 0 0 C ${w*1.5} ${l*0.2} ${w*1.5} ${l*0.8} 0 ${l} C ${-w*1.5} ${l*0.8} ${-w*1.5} ${l*0.2} 0 0 Z`;
                case 'larga': return `M 0 0 Q ${w*0.8} ${l} 0 ${l*2.5} Q ${-w*0.8} ${l} 0 0 Z`;
                case 'circular': return `M 0 ${w*1.2} A ${w*1.2} ${w*1.2} 0 1 0 0 ${-w*1.2+0.01} Z`; 
                case 'arce': return `M 0 0 L ${w} ${l*0.3} L ${w*2.5} 0 L ${w*1.2} ${l*0.6} L 0 ${l} L ${-w*1.2} ${l*0.6} L ${-w*2.5} 0 L ${-w} ${l*0.3} Z`;
                default: return `M 0 0 Q ${w} ${l/2} 0 ${l} Q ${-w} ${l/2} 0 0 Z`; 
            }
        }

        class FrutoFlor {
            constructor(tipo) {
                this.offsetX = rnd(-15, 15);
                this.offsetY = rnd(-15, 15);
                this.escalaTarget = rnd(0.8, 1.4);
                this.escalaActual = 0;
                this.podado = false;
                
                if (tipo === 'aleatorio') {
                    const tipos = ['flor-rosa', 'flor-blanca', 'flor-amarilla', 'limon', 'baya-roja', 'platano'];
                    tipo = tipos[Math.floor(Math.random() * tipos.length)];
                }
                
                const data = this.obtenerDatosMorfologicos(tipo);
                this.anguloCae = (tipo === 'limon' || tipo === 'platano') ? rnd(10, 45) * (Math.random() > 0.5 ? 1 : -1) : rnd(-15, 15);

                this.dom = document.createElementNS(SVG_NS, "path");
                this.dom.setAttribute("d", data.path);
                this.dom.setAttribute("fill", data.fill);
                this.dom.setAttribute("opacity", "0.95");
                this.dom.setAttribute("class", "flora-activa");
                this.dom.addEventListener('click', (e) => { e.stopPropagation(); this.cortar(); });
                
                layerFlowers.appendChild(this.dom);
                
                playPop();
            }

            obtenerDatosMorfologicos(tipo) {
                switch(tipo) {
                    case 'flor-rosa': return { fill: '#e8a0bf', path: "M 0 -4 Q 3 -3 4 0 Q 3 3 0 4 Q -3 3 -4 0 Q -3 -3 0 -4 Z" };
                    case 'flor-blanca': return { fill: '#f8f9fa', path: "M 0 -4 Q 3 -3 4 0 Q 3 3 0 4 Q -3 3 -4 0 Q -3 -3 0 -4 Z" };
                    case 'flor-amarilla': return { fill: '#fadd4b', path: "M 0 -4 Q 3 -3 4 0 Q 3 3 0 4 Q -3 3 -4 0 Q -3 -3 0 -4 Z" };
                    case 'limon': return { fill: '#fadd4b', path: "M 0 -5 C 4 -5 5 -2 5 0 C 5 3 3 5 0 6 C -3 5 -5 3 -5 0 C -5 -2 -4 -5 0 -5 Z" };
                    case 'baya-roja': return { fill: '#e74c3c', path: "M 0 -3 A 3 3 0 1 0 0 3 A 3 3 0 1 0 0 -3 Z M 3 2 A 2.5 2.5 0 1 0 3 -3 A 2.5 2.5 0 1 0 3 2 Z" };
                    case 'platano': return { fill: '#f1c40f', path: "M 2 -5 Q 5 0 2 5 Q 0 4 -1 0 Q 0 -4 2 -5 Z" };
                    default: return { fill: '#e8a0bf', path: "M 0 -4 Q 3 -3 4 0 Q 3 3 0 4 Q -3 3 -4 0 Q -3 -3 0 -4 Z" };
                }
            }
            cortar() { this.podado = true; this.dom.remove(); }
            
            animar(padreX, padreY, parentWindAngle = 0) {
                if(this.podado) return;
                this.escalaActual += (this.escalaTarget - this.escalaActual) * TENSION_ANIMACION;
                
                let windIntensity = parseInt(document.getElementById('p-viento').value) / 100;
                let swing = Math.sin(tiempoViento * 2.5 + this.offsetX) * windIntensity * 20; 
                let windRotDeg = (parentWindAngle * 180 / Math.PI) + swing;

                this.dom.setAttribute("transform", `translate(${padreX + this.offsetX}, ${padreY + this.offsetY}) rotate(${this.anguloCae + windRotDeg}) scale(${Math.max(0, this.escalaActual)})`);
                this.dom.style.display = showFlowers ? "block" : "none";
            }
        }

        class Brote {
            constructor(x, y, anguloRama) {
                this.x = x; this.y = y;
                this.angulo = anguloRama + rnd(-70, 70);
                this.longitud = rnd(8, 20);
                this.hojas = [];
                this.podado = false;
                
                this.g = document.createElementNS(SVG_NS, "g");
                this.g.setAttribute("class", "brote-activo");
                this.g.addEventListener('click', (e) => { e.stopPropagation(); this.cortar(); });
                
                this.tallo = document.createElementNS(SVG_NS, "line");
                this.tallo.setAttribute("stroke-width", "0.5"); 
                this.tallo.setAttribute("stroke", `rgb(${C_YOUNG.r}, ${C_YOUNG.g}, ${C_YOUNG.b})`); 
                this.g.appendChild(this.tallo);
                
                layerLeaves.appendChild(this.g);
            }
            
            crecer(delta = 1.0) {
                if (this.podado) return;
                let params = getParams();
                let probHoja = 1 - Math.pow(1 - 0.85, delta);
                
                if (this.hojas.length < params.maxHojas && Math.random() < probHoja) {
                    let variabilidadCae = rnd(10, 45);
                    let direccionCae = Math.random() > 0.5 ? 1 : -1;

                    const hojaObj = {
                        offsetX: rnd(-10, 10), offsetY: rnd(-10, 10),
                        escalaTarget: rnd(0.7, 1.3), escalaActual: 0,
                        anguloCae: variabilidadCae * direccionCae,
                        color: LEAF_COLORS[Math.floor(Math.random() * LEAF_COLORS.length)],
                        dom: document.createElementNS(SVG_NS, "path")
                    };
                    
                    let w = rnd(2.0, 4.0); let l = rnd(8.0, 14.0);
                    hojaObj.dom.setAttribute("d", generarPathHoja(params.formaHoja, w, l));
                    hojaObj.dom.setAttribute("fill", hojaObj.color);
                    hojaObj.dom.setAttribute("opacity", "0.95");
                    
                    this.hojas.push(hojaObj);
                    this.g.appendChild(hojaObj.dom);
                }
            }
            cortar() { this.podado = true; this.g.remove(); }
            
            animar(padreX, padreY, parentWindAngle = 0) {
                if (this.podado) return;
                this.x = padreX; this.y = padreY;
                
                let finalStemAngleRad = (this.angulo * Math.PI / 180) + parentWindAngle;
                const endX = this.x + Math.cos(finalStemAngleRad) * this.longitud;
                const endY = this.y + Math.sin(finalStemAngleRad) * this.longitud;
                
                this.g.style.display = showLeaves ? "block" : "none";
                this.tallo.setAttribute("x1", this.x); this.tallo.setAttribute("y1", this.y);
                this.tallo.setAttribute("x2", endX); this.tallo.setAttribute("y2", endY);

                let windIntensity = parseInt(document.getElementById('p-viento').value) / 100;
                let flutter = Math.sin(tiempoViento * 4.0 + this.x) * windIntensity * 15; 

                this.hojas.forEach(h => {
                    h.escalaActual += (h.escalaTarget - h.escalaActual) * TENSION_ANIMACION;
                    let windRotDeg = (parentWindAngle * 180 / Math.PI) + flutter;
                    h.dom.setAttribute("transform", `translate(${endX + h.offsetX}, ${endY + h.offsetY}) rotate(${h.anguloCae + windRotDeg}) scale(${Math.max(0, h.escalaActual)})`);
                });
            }
        }

        class Rama {
            constructor(gen, startX, startY, anguloInicial, padre = null) {
                this.padre = padre;
                this.gen = gen;
                this.age = 0; 
                this.podada = false; 
                this.seed = Math.random() * 1000; 
                
                // HERENCIA GENÉTICA: El hijo siempre copia el color base del padre
                if (this.padre) {
                    this.baseBarkColor = this.padre.baseBarkColor;
                } else {
                    this.baseBarkColor = BARK_PALETTE[Math.floor(this.seed % BARK_PALETTE.length)];
                }

                this.startX = startX; this.startY = startY;
                this.angulo = anguloInicial;
                
                let params = getParams();
                this.curvatura = rnd(-params.maxAngle, params.maxAngle) + ((-90 - this.angulo) * 0.1); 
                
                let v = params.lenVariance;
                this.lenMultiplier = this.gen === 0 ? (1.0 + rnd(-v * 0.5, v * 0.5)) : (1.0 + rnd(-v, v));
                
                this.lenObj = 0; 
                this.lenAct = 0; 
                this.grosorBaseAct = 0; 
                this.grosorPuntaAct = 0;
                
                this.grosorBrutoObj = 2.0; 
                this.grosorBaseObj = this.padre ? Math.min(this.grosorBrutoObj, this.padre.grosorPuntaObj) : this.grosorBrutoObj; 
                this.grosorPuntaObj = this.grosorBaseObj * 0.5;
                
                this.hijos = [];
                this.brotes = [];
                this.flora = [];
                this.haBifurcado = false;
                this.tieneAccesoria = false;
                this.currentFill = `rgb(${C_YOUNG.r}, ${C_YOUNG.g}, ${C_YOUNG.b})`;
                
                this.g = document.createElementNS(SVG_NS, "g");
                this.g.setAttribute("class", "rama-activa");
                this.g.addEventListener('click', (e) => { e.stopPropagation(); this.cortar(); });
                
                this.path = document.createElementNS(SVG_NS, "path");
                this.jointBase = document.createElementNS(SVG_NS, "circle");
                this.jointTip = document.createElementNS(SVG_NS, "circle");
                
                this.g.appendChild(this.jointBase);
                this.g.appendChild(this.path);
                this.g.appendChild(this.jointTip);
                
                layerTree.appendChild(this.g);
            }

            crecer(delta = 1.0) {
                if (this.podada) return;
                let params = getParams();

                if (this.age < MAX_AGE) {
                    let prevAge = this.age;
                    this.age = Math.min(MAX_AGE, this.age + delta);
                    let growthFraction = this.age - prevAge; 

                    let incremento = Math.max(0, (MAX_AGE - this.age) * (params.baseLength * 0.1)) * growthFraction * this.lenMultiplier;
                    this.lenObj += incremento;
                    this.grosorBrutoObj += (params.maxGen - this.gen) * 0.4 * growthFraction; 
                }

                this.grosorBaseObj = this.grosorBrutoObj;
                if (this.padre) {
                    this.grosorBaseObj = Math.min(this.grosorBaseObj, this.padre.grosorPuntaObj);
                }
                
                let ratioMadurez = Math.min(1, this.age / MAX_AGE);
                let taper = 0.5 + (0.5 * ratioMadurez); 
                this.grosorPuntaObj = this.grosorBaseObj * taper;

                this.brotes.forEach(b => b.crecer(delta));
                this.hijos.forEach(h => h.crecer(delta));

                if (this.gen > 0 && params.maxHojas > 0) { 
                    let maxBrotes = (this.hijos.length === 0) ? 5 : 2; 
                    let probBrote = 1 - Math.pow(1 - 0.75, delta);
                    if (this.brotes.length < maxBrotes && Math.random() < probBrote) {
                        this.brotes.push(new Brote(this.endXAct || this.startX, this.endYAct || this.startY, this.angulo));
                    }
                }

                if (params.tipoFlora !== 'ninguno') {
                    let esRamaTerminal = this.gen >= params.maxGen - 2;
                    let probFlora = 1 - Math.pow(1 - 0.60, delta);
                    if (this.age >= params.inicioFloracion && esRamaTerminal) {
                        if (this.flora.length < 4 && Math.random() < probFlora) {
                            this.flora.push(new FrutoFlor(params.tipoFlora));
                        }
                    }
                }

                let edadBifurcacion = params.edadRamificacion;

                if (this.age >= edadBifurcacion && this.gen < params.maxGen - 1 && !this.haBifurcado) {
                    let prob = this.gen === 0 ? 0.90 : params.branchProb;
                    if (Math.random() < prob) {
                        let spread = rnd(15, params.maxAngle);
                        this.crearHijo(this.angulo + spread);
                        this.crearHijo(this.angulo - spread);
                    } else {
                        this.crearHijo(this.angulo + rnd(-15, 15));
                    }
                    this.haBifurcado = true;
                }

                if (this.age >= edadBifurcacion + 1.0 && this.gen > 1 && this.gen < params.maxGen - 1 && !this.tieneAccesoria) {
                    if (Math.random() < params.accProb) {
                        this.crearHijo(this.angulo + rnd(30, params.maxAngle) * (Math.random() > 0.5 ? 1 : -1)); 
                        this.tieneAccesoria = true;
                    }
                }
            }

            crearHijo(angulo) {
                this.hijos.push(new Rama(this.gen + 1, this.endXAct || this.startX, this.endYAct || this.startY, angulo, this));
            }

            cortar() {
                this.brotes.forEach(b => b.cortar()); this.brotes = [];
                this.flora.forEach(f => f.cortar()); this.flora = [];
                
                const destruirDescendencia = (rama) => {
                    rama.hijos.forEach(h => destruirDescendencia(h));
                    rama.brotes.forEach(b => b.cortar());
                    rama.flora.forEach(f => f.cortar());
                    rama.g.remove();
                };
                
                if (this.hijos.length > 0) {
                    this.hijos.forEach(h => destruirDescendencia(h));
                    this.hijos = []; this.haBifurcado = false; this.tieneAccesoria = false; this.age = 2; 
                } else if (this.padre) {
                    this.g.remove();
                    this.padre.hijos = this.padre.hijos.filter(h => h !== this);
                }
            }

            lerpColor(f) {
                const bark = this.baseBarkColor;
                return {
                    r: Math.round(C_YOUNG.r + (bark.r - C_YOUNG.r) * f),
                    g: Math.round(C_YOUNG.g + (bark.g - C_YOUNG.g) * f),
                    b: Math.round(C_YOUNG.b + (bark.b - C_YOUNG.b) * f)
                };
            }

            animarYRenderizar(parentWindAngle = 0) {
                this.lenAct += (this.lenObj - this.lenAct) * TENSION_ANIMACION;
                this.grosorBaseAct += (this.grosorBaseObj - this.grosorBaseAct) * TENSION_ANIMACION;
                this.grosorPuntaAct += (this.grosorPuntaObj - this.grosorPuntaAct) * TENSION_ANIMACION;

                let ratioMadurez = Math.min(1, this.age / MAX_AGE);
                let c = this.lerpColor(ratioMadurez);
                this.currentFill = `rgb(${c.r}, ${c.g}, ${c.b})`;
                
                this.path.setAttribute("fill", this.currentFill);
                this.jointTip.setAttribute("fill", this.currentFill);

                if (this.padre && this.padre.currentFill) {
                    this.jointBase.setAttribute("fill", this.padre.currentFill);
                } else {
                    this.jointBase.setAttribute("fill", this.currentFill);
                }

                let windIntensity = parseInt(document.getElementById('p-viento').value) / 100;
                let flex = 1.0 / (this.grosorBaseAct * 0.5 + 1.0); 
                let localWind = Math.sin(tiempoViento * 1.5 + this.seed) * windIntensity * flex * 0.15; 
                let totalWind = parentWindAngle + localWind;

                let angRadInicio = (this.angulo * Math.PI / 180) + totalWind;
                let angRadFin = ((this.angulo + this.curvatura) * Math.PI / 180) + totalWind;
                let angRadMid = (angRadInicio + angRadFin) / 2;

                let midX = this.startX + Math.cos(angRadInicio) * (this.lenAct * 0.5);
                let midY = this.startY + Math.sin(angRadInicio) * (this.lenAct * 0.5);
                this.endXAct = midX + Math.cos(angRadFin) * (this.lenAct * 0.5);
                this.endYAct = midY + Math.sin(angRadFin) * (this.lenAct * 0.5);

                let rBase = this.grosorBaseAct / 2; 
                let rFin = this.grosorPuntaAct / 2; 
                
                let amplitudRugosidad = (ratioMadurez > 0.5) ? (rBase * 0.15) * (ratioMadurez - 0.5) : 0;
                let perturbBase = Math.sin(this.seed) * amplitudRugosidad;
                let perturbMid = Math.sin(this.seed + midX * 0.1) * amplitudRugosidad;
                let perturbFin = Math.sin(this.seed + midY * 0.1) * amplitudRugosidad;

                rBase += perturbBase; 
                let rMid = (rBase + rFin) / 2 + perturbMid; 
                rFin += perturbFin;

                let nInicioX = Math.cos(angRadInicio - Math.PI/2); let nInicioY = Math.sin(angRadInicio - Math.PI/2);
                let nMidX = Math.cos(angRadMid - Math.PI/2); let nMidY = Math.sin(angRadMid - Math.PI/2);
                let nFinX = Math.cos(angRadFin - Math.PI/2); let nFinY = Math.sin(angRadFin - Math.PI/2);

                let bx1 = this.startX + nInicioX * rBase; let by1 = this.startY + nInicioY * rBase;
                let bx2 = this.startX - nInicioX * rBase; let by2 = this.startY - nInicioY * rBase;
                let cx1 = midX + nMidX * rMid; let cy1 = midY + nMidY * rMid;
                let cx2 = midX - nMidX * rMid; let cy2 = midY - nMidY * rMid;
                let px1 = this.endXAct + nFinX * rFin; let py1 = this.endYAct + nFinY * rFin;
                let px2 = this.endXAct - nFinX * rFin; let py2 = this.endYAct - nFinY * rFin;

                let polyPath = `M ${bx1} ${by1} Q ${cx1} ${cy1} ${px1} ${py1} L ${px2} ${py2} Q ${cx2} ${cy2} ${bx2} ${by2} Z`;
                this.path.setAttribute("d", polyPath);

                if (this.padre) {
                    this.jointBase.setAttribute("cx", this.startX); 
                    this.jointBase.setAttribute("cy", this.startY);
                    this.jointBase.setAttribute("r", Math.max(0, rBase));
                }

                this.jointTip.setAttribute("cx", this.endXAct); 
                this.jointTip.setAttribute("cy", this.endYAct);
                this.jointTip.setAttribute("r", Math.max(0, rFin));
                this.jointTip.style.display = "block"; 

                this.hijos.forEach(hijo => {
                    if (hijo.esAccesoria) {
                        hijo.startX = midX;
                        hijo.startY = midY;
                    } else {
                        hijo.startX = this.endXAct;
                        hijo.startY = this.endYAct;
                    }
                    hijo.animarYRenderizar(totalWind);
                });

                this.brotes.forEach(brote => brote.animar(this.endXAct, this.endYAct, totalWind));
                this.flora.forEach(f => f.animar(this.endXAct, this.endYAct, totalWind));
            }

            contarNodos() { return 1 + this.hijos.reduce((acc, h) => acc + h.contarNodos(), 0); }
        }

        // --- SISTEMA DE TIEMPO Y BUCLE ---
        let arbolBase;

        function resetTimerIdle() {
            document.body.classList.remove('zen-idle');
            clearTimeout(idleTimeout);
            idleTimeout = setTimeout(() => { document.body.classList.add('zen-idle'); }, 2500);
        }

        document.body.addEventListener('mousemove', resetTimerIdle);
        document.body.addEventListener('touchstart', resetTimerIdle);

        function bucleAnimacion() {
            tiempoViento += 0.016; 
            
            if (sfxEnabled && windGainNode && audioCtx) {
                try {
                    let windIntensity = parseInt(document.getElementById('p-viento').value) / 100;
                    let vol = windIntensity * (0.05 + 0.15 * Math.abs(Math.sin(tiempoViento * 1.5)));
                    windGainNode.gain.setTargetAtTime(vol, audioCtx.currentTime, 0.1);
                } catch(e) {}
            }

            if (isZenMode && !zenPausa && arbolBase) {
                let deltaZen = 0.015; 
                arbolBase.crecer(deltaZen);
                iteracionGlobal += deltaZen;
                statsDisplay.textContent = `NODOS: ${arbolBase.contarNodos()} | AÑOS: ${iteracionGlobal.toFixed(1)}`;

                if (iteracionGlobal > 18) {
                    zenPausa = true;
                    setTimeout(() => {
                        if(isZenMode) { mutarParametros(); } 
                    }, 4000); 
                }
            }

            if (arbolBase) arbolBase.animarYRenderizar(0); 
            animationFrameId = requestAnimationFrame(bucleAnimacion);
        }

        function inicializar() {
            layerTree.innerHTML = ''; layerLeaves.innerHTML = ''; layerFlowers.innerHTML = '';
            
            // CORRECCIÓN CRÍTICA: Liberar el slot de animación
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }
            
            arbolBase = new Rama(0, 0, 0, -90);
            iteracionGlobal = 0;
            zenPausa = false;
            statsDisplay.textContent = `NODOS: 1 | AÑOS: 0.0`;
            
            // Re-inicia el motor de físicas
            bucleAnimacion();
            resetTimerIdle();
        }

        document.getElementById('btn-reset').addEventListener('click', () => { inicializar(); });
        document.getElementById('btn-mutar').addEventListener('click', () => { mutarParametros(); });
        
        document.getElementById('btn-hojas').addEventListener('click', (e) => { 
            showLeaves = !showLeaves; 
            e.target.classList.toggle('active-toggle', showLeaves); 
        });
        document.getElementById('btn-flores').addEventListener('click', (e) => { 
            showFlowers = !showFlowers; 
            e.target.classList.toggle('active-toggle', showFlowers); 
        });

        // Interfaz Zen Principal
        const btnZenMain = document.getElementById('btn-zen-main');
        
        btnZenMain.addEventListener('click', () => {
            isZenMode = !isZenMode;
            if (isZenMode) {
                document.body.classList.add('zen-active');
                btnZenMain.classList.add('active');
                zenPausa = false;
                if (iteracionGlobal > 18) { mutarParametros(); } 
                if (musicEnabled && audioCtx) {
                    clearTimeout(chimeTimeout);
                    playGenerativeChime();
                }
            } else {
                document.body.classList.remove('zen-active');
                btnZenMain.classList.remove('active');
                clearTimeout(chimeTimeout);
            }
        });

        // ARRANQUE SEGURO
        renderizarMaceta();
        aplicarPreset('pino');
        
        // Activa visualmente el Modo Zen y el motor arranca solo
        isZenMode = true;
        document.body.classList.add('zen-active');
        btnZenMain.classList.add('active');
    </script>
</body>
</html>
