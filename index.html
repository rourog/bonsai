<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>Bonsai Zen - Estudio Paramétrico</title>
    <meta name="theme-color" content="#7A9E7E">
    <meta name="description" content="Cultiva bonsáis procedurales infinitos.">

    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" />
    <link rel="stylesheet" href="estilos.css">

    <style>
        #viewport {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: #FAF9F6; /* Fondo Blanco Papel */
            overflow: hidden;
        }

        #sky-bg {
            position: absolute;
            width: 100%; height: 100%;
            z-index: 1;
        }

        #bonsai-canvas {
            position: absolute;
            width: 100%; height: 100%;
            z-index: 5;
            display: flex;
            align-items: flex-end; 
            justify-content: center;
            /* Espacio optimizado para la maceta cerca del margen inferior */
            padding-bottom: calc(10vh + env(safe-area-inset-bottom, 0px));
            box-sizing: border-box;
            transition: transform 0.6s cubic-bezier(0.2, 0, 0, 1);
        }

        /* Desplazamiento del bonsái al abrir el menú en escritorio */
        @media (min-width: 769px) {
            body:has(#dashboard.open) #bonsai-canvas {
                transform: translateX(-150px);
            }
        }

        svg {
            width: 100%; 
            max-height: 85vh; 
            overflow: visible;
        }
    </style>
</head>
<body>

    <div id="viewport">
        <div id="sky-bg"></div>

        <div id="bonsai-canvas">
            <svg viewBox="-200 -380 400 430" preserveAspectRatio="xMidYMax meet">
                <g id="layer-pot" transform="translate(0, 0)"></g>
                <g id="layer-tree"></g>
                <g id="layer-leaves"></g>
                <g id="layer-flowers"></g>
            </svg>
        </div>

        <div id="stats">CARGANDO...</div>

        <div id="right-controls">
            <button id="btn-music-quick" class="fab-small" title="Música">
                <span class="material-symbols-rounded">music_off</span>
            </button>
            <button id="btn-sfx-quick" class="fab-small" title="Efectos de Sonido">
                <span class="material-symbols-rounded">volume_off</span>
            </button>
            
            <button id="btn-zen-main" title="Modo Zen">
                <div class="zen-ripple ripple-1"></div>
                <div class="zen-ripple ripple-2"></div>
                <div class="zen-ripple ripple-3"></div>
                <span class="material-symbols-rounded" style="font-size: 32px; position: relative; z-index: 2;">self_improvement</span>
            </button>

            <button id="btn-fondo-quick" class="fab-small" title="Cielo / Fondo">
                <span class="material-symbols-rounded">image</span>
            </button>
            <button id="btn-open-config" class="fab-small" title="Abrir Ajustes">
                <span class="material-symbols-rounded">settings</span>
            </button>
        </div>

        <aside id="dashboard">
            <div class="panel-header">
                <h3>Estudio Botánico</h3>
                <button id="btn-close-config" class="close-btn">
                    <span class="material-symbols-rounded">close</span>
                </button>
            </div>

            <div class="panel-content">
                <div class="ui-section">
                    <label class="section-label">IDENTIDAD DEL ÁRBOL</label>
                    <div style="display: flex; gap: 8px; margin-bottom: 15px;">
                        <input type="text" id="input-semilla" placeholder="SEMILLA" maxlength="12">
                        <button id="btn-copiar-semilla" class="action-btn">
                            <span class="material-symbols-rounded">content_copy</span>
                        </button>
                    </div>
                </div>

                <div class="ui-section">
                    <label class="section-label">ESPECIES PREDEFINIDAS</label>
                    <div class="grid-2">
                        <button class="action-btn" onclick="aplicarPreset('pino')"><span class="material-symbols-rounded">forest</span> PINO</button>
                        <button class="action-btn" onclick="aplicarPreset('roble')"><span class="material-symbols-rounded">park</span> ROBLE</button>
                        <button class="action-btn" onclick="aplicarPreset('cerezo')"><span class="material-symbols-rounded">local_florist</span> CEREZO</button>
                        <button class="action-btn" onclick="aplicarPreset('limonero')"><span class="material-symbols-rounded">eco</span> LIMÓN</button>
                        <button class="action-btn" onclick="aplicarPreset('cipres')"><span class="material-symbols-rounded">spa</span> CIPRÉS</button>
                        <button class="action-btn" onclick="aplicarPreset('arbusto')"><span class="material-symbols-rounded">yard</span> ARBUSTO</button>
                    </div>
                </div>

                <div class="ui-section" id="ui-morfologia">
                    <label class="section-label">DISEÑO Y MACETA</label>
                </div>

                <div class="ui-section" id="ui-parametros">
                    <label class="section-label">CRECIMIENTO</label>
                </div>

                <div class="ui-section">
                    <label class="section-label">SISTEMA</label>
                    <div class="grid-2">
                        <button id="btn-step" class="action-btn"><span class="material-symbols-rounded">skip_next</span> +1 AÑO</button>
                        <button id="btn-auto" class="action-btn"><span class="material-symbols-rounded">play_arrow</span> AUTO: OFF</button>
                        <button id="btn-mutar" class="action-btn"><span class="material-symbols-rounded">shuffle</span> MUTAR</button>
                        <button id="btn-hojas" class="action-btn active-toggle"><span class="material-symbols-rounded">energy_savings_leaf</span> HOJAS</button>
                        <button id="btn-flores" class="action-btn active-toggle"><span class="material-symbols-rounded">filter_vintage</span> FLORA</button>
                        <button id="btn-fondo" class="action-btn"><span class="material-symbols-rounded">landscape</span> CIELO</button>
                        <button id="btn-sfx" class="action-btn"><span class="material-symbols-rounded">volume_up</span> SFX</button>
                        <button id="btn-music" class="action-btn"><span class="material-symbols-rounded">music_note</span> MÚSICA</button>
                        <button id="btn-reset" class="action-btn" style="border-color: var(--md-sys-color-secondary); color: var(--md-sys-color-secondary); grid-column: span 2;">
                            <span class="material-symbols-rounded">restart_alt</span> REPLANTAR
                        </button>
                    </div>
                </div>
            </div>
        </aside>
    </div>

    <script type="module" src="./main.js?v=21"></script>
</body>
</html>
